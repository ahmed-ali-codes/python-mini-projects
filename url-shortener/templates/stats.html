<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Stats</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        h1 { color: #333; text-align: center; }
        .stats-card { background: #f8f9fa; border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .stat-item { margin-bottom: 15px; }
        .stat-label { font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 18px; word-break: break-all; }
        .clicks { font-size: 32px; color: #007bff; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Link Statistics</h1>

    <div class="stats-card">
        <div class="stat-item">
            <span class="stat-label">Original URL:</span>
            <span class="stat-value"><a href="{{ url['original_url'] }}" target="_blank">{{ url['original_url'] }}</a></span>
        </div>
        
        <div class="stat-item">
            <span class="stat-label">Short ID:</span>
            <span class="stat-value">{{ url['short_id'] }}</span>
        </div>

        <div class="stat-item">
            <span class="stat-label">Total Clicks:</span>
            <span class="stat-value clicks">{{ url['clicks'] }}</span>
        </div>
        
        <div class="stat-item">
            <span class="stat-label">Created At:</span>
            <span class="stat-value">{{ url['created_at'] }}</span>
        </div>
    </div>

    <a href="{{ url_for('index') }}" class="back-link">← Back to Home</a>
</body>
</html>
