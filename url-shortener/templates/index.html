<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        h1 { color: #333; text-align: center; }
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        input[type="url"] { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 30px; padding: 20px; background-color: #f8f9fa; border-radius: 4px; text-align: center; border: 1px solid #dee2e6; }
        .flash { color: red; margin-bottom: 20px; text-align: center; font-weight: bold; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>URL Shortener</h1>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="url" name="url" placeholder="https://example.com" required>
        <button type="submit">Shorten URL</button>
    </form>

    {% if short_url %}
        <div class="result">
            <h3>Your short URL is ready!</h3>
            <p><a href="{{ short_url }}" target="_blank">{{ short_url }}</a></p>
            <p><a href="{{ url_for('stats', short_id=short_id) }}">View click stats</a></p>
        </div>
    {% endif %}
</body>
</html>
